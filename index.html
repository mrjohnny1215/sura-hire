<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>수라간 박상선 면접 보고서</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        body {
            font-family: 'Malgun Gothic', 'Apple SD Gothic Neo', sans-serif;
            background-color: #ffffff;
            color: #000000;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* 입력 및 출력 영역 박스 (전체 중앙 정렬 및 여백 고정) */
        .report-container {
            width: 100%;
            max-width: 650px; /* 인쇄 및 화면 보기 가장 안정적인 폭 */
            padding: 40px 20px;
            box-sizing: border-box;
            background: #ffffff;
        }

        h1 {
            text-align: center;
            font-size: 26px;
            margin-bottom: 50px;
            font-weight: bold;
            letter-spacing: 1px;
        }

        /* 양옆 여백을 꽉 채우고 정렬을 맞추기 위한 핵심 설정 */
        .form-group {
            display: flex;
            justify-content: space-between; /* 항목명은 왼쪽 끝, 입력창은 오른쪽 끝으로 */
            align-items: center;
            margin-bottom: 28px;
            font-size: 18px;
            width: 100%;
        }

        /* 항목 이름 스타일 (너비 확보 및 한 줄 고정) */
        .form-group label {
            width: 210px; 
            font-weight: bold;
            flex-shrink: 0;
            white-space: nowrap;
            letter-spacing: -0.5px;
        }

        /* 입력창 스타일 (양옆 정렬이 맞도록 늘어남 설정) */
        .form-group input {
            flex-grow: 1;
            border: none;
            border-bottom: 1px solid #000000; /* 조금 더 선명하게 검은색 밑줄로 변경 */
            background: transparent;
            font-size: 18px;
            color: #000000;
            padding: 4px 5px;
            outline: none;
            font-family: inherit;
            width: 100%; /* 너비를 꽉 채우도록 설정 */
        }

        /* 특이사항 칸 (메모장) 정렬 예외 처리 */
        .form-group.textarea-group {
            align-items: flex-start;
        }

        .form-group textarea {
            flex-grow: 1;
            resize: none;
            height: 120px;
            border: 1px solid #000000; /* 깔끔한 검은색 테두리 */
            padding: 10px;
            font-size: 17px;
            font-family: inherit;
            outline: none;
            box-sizing: border-box;
        }

        /* 버튼 영역 스타일 (PDF 출력 시 숨겨짐) */
        .btn-container {
            margin-top: 20px;
            text-align: center;
            width: 100%;
            max-width: 650px;
        }

        .print-btn {
            background-color: #000000;
            color: #ffffff;
            border: 1px solid #000000;
            padding: 12px 0;
            width: 100%; /* 버튼도 서류 폭과 딱 맞게 가득 채워 정렬감 향상 */
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s;
        }

        .print-btn:hover {
            background-color: #ffffff;
            color: #000000;
        }

        /* PDF 저장 시 버튼 제외 및 여백 최적화 */
        @media print {
            .btn-container {
                display: none;
            }
            body {
                padding: 0;
            }
            .report-container {
                padding: 10px 0;
                width: 100%;
            }
        }
    </style>
</head>
<body>

    <div class="report-container" id="pdf-area">
        <h1>수라간 박상선 면접 보고서</h1>
        
        <div class="form-group">
            <label>날짜 :</label>
            <input type="date" id="date">
        </div>
        <div class="form-group">
            <label>이름 :</label>
            <input type="text" placeholder="지원자 이름 또는 닉네임 입력">
        </div>
        <div class="form-group">
            <label>나이 :</label>
            <input type="text" placeholder="예: 30대 / 40대">
        </div>
        <div class="form-group">
            <label>성별 :</label>
            <input type="text" placeholder="남 / 여">
        </div>
        <div class="form-group">
            <label>연락처 :</label>
            <input type="text" placeholder="010-XXXX-XXXX">
        </div>
        <div class="form-group">
            <label>사는곳 :</label>
            <input type="text" placeholder="동네 명칭 또는 주소 입력">
        </div>
        <div class="form-group">
            <label>경력 :</label>
            <input type="text" placeholder="주방 및 홀 경력 사항 기술 (예: 주방 2년 등)">
        </div>
        <div class="form-group">
            <label>근무 가능 요일 및 시간 :</label>
            <input type="text" placeholder="예: 주 6일(화~일) / 09:00 ~ 21:00">
        </div>
        <div class="form-group textarea-group">
            <label>특이사항 :</label>
            <textarea placeholder="칼질 능력(상/중/하), 보건증 유무, 인상 등 사장님 메모 공간"></textarea>
        </div>
    </div>

    <div class="btn-container">
        <button class="print-btn" onclick="saveAsPDF()">PDF 파일로 저장하기</button>
    </div>

    <script>
        // 오늘 날짜 자동으로 입력되게 설정
        document.getElementById('date').value = new Date().toISOString().substring(0, 10);

        // PDF로 깔끔하게 변환해주는 함수
        function saveAsPDF() {
            const element = document.getElementById('pdf-area');
            
            const options = {
                margin:       15,
                filename:     '수라간_면접보고서_' + new Date().toISOString().substring(0, 10) + '.pdf',
                image:        { type: 'jpeg', quality: 0.98 },
                html2canvas:  { scale: 2, useCORS: true },
                jsPDF:        { unit: 'mm', format: 'a4', orientation: 'portrait' }
            };

            html2pdf().set(options).from(element).save();
        }
    </script>
</body>
</html>
