<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>수라간 박상선 면접 보고서</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        body {
            font-family: 'Malgun Gothic', 'Apple SD Gothic Neo', sans-serif;
            background-color: #ffffff;
            color: #000000;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* 입력 및 출력 영역 박스 */
        .report-container {
            width: 100%;
            max-width: 700px;
            padding: 40px;
            box-sizing: border-box;
            background: #ffffff;
        }

        h1 {
            text-align: center;
            font-size: 28px;
            margin-bottom: 50px;
            font-weight: bold;
            letter-spacing: 1px;
        }

        .form-group {
            display: flex;
            align-items: flex-start;
            margin-bottom: 25px;
            font-size: 18px;
        }

        .form-group label {
            width: 180px;
            font-weight: bold;
            flex-shrink: 0;
            padding-top: 2px;
        }

        /* 입력창 스타일: 흰 바탕에 테두리 없이 깔끔하게 조절 */
        .form-group input, .form-group textarea {
            flex-grow: 1;
            border: none;
            border-bottom: 1px solid #cccccc;
            background: transparent;
            font-size: 18px;
            color: #000000;
            padding: 2px 5px;
            outline: none;
            font-family: inherit;
        }

        .form-group textarea {
            resize: none;
            height: 100px;
            border: 1px solid #cccccc;
            padding: 5px;
        }

        /* 버튼 영역 스타일 (PDF 출력 시 숨겨짐) */
        .btn-container {
            margin-top: 30px;
            text-align: center;
        }

        .print-btn {
            background-color: #000000;
            color: #ffffff;
            border: 1px solid #000000;
            padding: 12px 35px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s;
        }

        .print-btn:hover {
            background-color: #ffffff;
            color: #000000;
        }

        /* PDF 저장 시 버튼 등 불필요한 요소 제외하는 설정 */
        @media print {
            .btn-container {
                display: none;
            }
            body {
                padding: 0;
            }
            .report-container {
                padding: 20px;
            }
        }
    </style>
</head>
<body>

    <div class="report-container" id="pdf-area">
        <h1>수라간 박상선 면접 보고서</h1>
        
        <div class="form-group">
            <label>날짜 :</label>
            <input type="date" id="date">
        </div>
        <div class="form-group">
            <label>이름 :</label>
            <input type="text" placeholder="지원자 이름 입력">
        </div>
        <div class="form-group">
            <label>나이 :</label>
            <input type="text" placeholder="예: 30대 / 만 32세">
        </div>
        <div class="form-group">
            <label>성별 :</label>
            <input type="text" placeholder="남 / 여">
        </div>
        <div class="form-group">
            <label>연락처 :</label>
            <input type="text" placeholder="010-XXXX-XXXX">
        </div>
        <div class="form-group">
            <label>사는곳 :</label>
            <input type="text" placeholder="동네 명칭 또는 주소 입력">
        </div>
        <div class="form-group">
            <label>경력 :</label>
            <input type="text" placeholder="주방 및 홀 경력 사항 기술 (예: 주방 2년 등)">
        </div>
        <div class="form-group">
            <label>근무 가능 요일 및 시간 :</label>
            <input type="text" placeholder="예: 주 6일(화~일) / 09:00 ~ 21:00">
        </div>
        <div class="form-group">
            <label>특이사항 :</label>
            <textarea placeholder="칼질 능력(상/중/하), 보건증 유무, 인상 등 사장님 메모 공간"></textarea>
        </div>
    </div>

    <div class="btn-container">
        <button class="print-btn" onclick="saveAsPDF()">PDF 파일로 저장하기</button>
    </div>

    <script>
        // 오늘 날짜 자동으로 넣어주는 센스!
        document.getElementById('date').value = new Date().toISOString().substring(0, 10);

        // PDF로 깔끔하게 변환해주는 함수
        function saveAsPDF() {
            const element = document.getElementById('pdf-area');
            
            // PDF 저장 옵션 설정
            const options = {
                margin:       10,
                filename:     '수라간_면접보고서_' + new Date().toISOString().substring(0, 10) + '.pdf',
                image:        { type: 'jpeg', quality: 0.98 },
                html2canvas:  { scale: 2, useCORS: true },
                jsPDF:        { unit: 'mm', format: 'a4', orientation: 'portrait' }
            };

            // 변환 실행
            html2pdf().set(options).from(element).save();
        }
    </script>
</body>
</html>
